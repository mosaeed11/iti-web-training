<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        form {
            width: 400px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid black;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #0077cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #005fa3;
        }

        video {
            width: 800px;
            max-width: 100%;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }

        svg {
            width: 150px;
            height: 150px;
            margin-top: 30px;
            fill: #0077cc;
        }
    </style>
</head>
<body>
    <form action="thanks.html">
        <label for="name">User Name:</label>
        <input type="text" id="uname" name="uname" required>
        <br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="18" max="40">
        <br>
        <label for="address">Address:</label>
        <input type="text" id="address" name="address">
        <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone">
        <br>
        <label for="dropdown">Select Job Title :</label>
        <select id="dropdown" name="dropdown">
            <option value="developer">Developer</option>
            <option value="designer">Designer</option>
            <option value="manager">Manager</option>
            <option value="hr">Hr</option>
        </select>
        <br>
        <label>Gender:</label>
        <br>
        <input type="radio" id="gender_male" name="gender" value="Male">
        <label for="gender_male">Male</label>
        <br>
        <input type="radio" id="gender_female" name="gender" value="Female">
        <label for="gender_female">Female</label>
        <br>

        <input type="checkbox" id="agree_terms" name="agreeterms">
        <label for="agree_terms">I Agree To The Terms</label>
        <br>
        <button type="submit">Submit</button>
    </form>

    <video width="800" controls>
        <source src="videos\sample.mp4" type="video/mp4">
        <source src="videos\sample.ogv" type="video/mp4">
        <source src="videos\sample.webm" type="video/mp4">
    </video>

</html>
